<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário HTML</title>
</head>
<body>
<h1>Formulário HTML</h1>    
    <form>
        <label for="nome">Nome:</label>
        <input type="text" placeholder="Digite seu nome completo" required>
        <br><br>
        <label>Sexo:</label>
        <input type="radio" value="feminino" name="sexo" id="fem" required>
        <label for="fem">Feminino</label>
        <input type="radio" value="masculino" name="sexo" id="masc" required>
        <label for="masc">Masculino</label>
        <br><br>        
        <label>Estado Civil:</label>
        <select required>
            <option value="">Selecione...</option>
            <option value="solteiro">Solteiro</option>
            <option value="casado">Casado</option>
            <option value="viúvo">Viúvo</option>
            <option value="divorciado">Divorciado</option>
            <option value="outro">Outro</option>
        </select>
        <br><br>
        <label for="email">E-mail:</label>
        <input type="text" placeholder="exemplo@email.com" required>
        <br><br>
        <label for="text">Endereço:</label>
        <input type="text" required>
        <br><br>
        <label>Número:</label>
        <input type="number" min="1" required>
        <br><br>
        <label>Data de Nascimento:</label>
        <input type="date" required>
        <br><br>
        <label>Número de Telefone:</label>
        <input type="tel" placeholder="(11) 9XXXX-XXXX" required>
        <br><br>
        <label>Página pessoal:</label>
        <input type="url" placeholder="https://www.exemplo.com">
        <br><br>
        <button type="submit">Cadastrar</button><button type="reset">Limpar Tudo</button>
    </form>    
</body>
</html>
